<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix ERP - Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="scripts.js"></script>
    <style>
        .produto-card { border: 1px solid #e5e7eb; transition: all 0.2s; }
        .produto-card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .produto-card.selecionado { background-color: #eff6ff; border-color: #3b82f6; border-width: 2px; }
        .overflow-y-auto::-webkit-scrollbar { width: 8px; }
        .overflow-y-auto::-webkit-scrollbar-track { background: #f1f1f1; }
        .overflow-y-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-y-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <div id="sidebar-container"></div>
    <script src="sidebar.js"></script>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">

        <div id="aba-produtos" class="space-y-6">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b pb-2">🏷️ Gestão de Produtos</h2>
            <div class="bg-white p-4 md:p-6 rounded-lg shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold text-gray-700">Cadastro de Produtos</h3>
                    <button onclick="window.abrirCadastroCompletoProduto()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition text-sm font-bold flex items-center gap-2">
                        ➕ Novo Produto
                    </button>
                </div>
                <div class="mt-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-700">Produtos Cadastrados</h3>
                        <input type="text" placeholder="🔍 Buscar por código, nome ou categoria..." class="p-2 border rounded border-gray-300 w-80 text-sm outline-none focus:border-blue-500" onkeyup="window.filtrarProdutos(this.value)">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-600 text-sm">
                                    <th class="p-2 border">Código</th>
                                    <th class="p-2 border">Descrição</th>
                                    <th class="p-2 border">Categoria</th>
                                    <th class="p-2 border">Marca</th>
                                    <th class="p-2 border">Preço</th>
                                    <th class="p-2 border">Estoque</th>
                                    <th class="p-2 border">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="lista-produtos" class="text-sm">
                                <tr><td colspan="7" class="p-4 text-center text-gray-500">Carregando...</td></tr>
                            </tbody>
                        </table>
                        <div id="pag-produtos"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="firebase.js"></script>
</body>
</html>
