<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix ERP | Zion Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05070a;
            background-image: radial-gradient(circle at 2px 2px, #1e2533 1px, transparent 0);
            background-size: 40px 40px;
        }
        .glass {
            background: rgba(15, 18, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .input-dark {
            background: #0f121a;
            border: 1px solid #1e2533;
            color: white;
            transition: all 0.3s ease;
        }
        .input-dark:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen overflow-hidden p-4">

    <div class="w-full max-w-md glass p-10 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-10 relative">
            <img src="zion_logo.png" alt="Zion Logo" class="w-24 mx-auto mb-4 brightness-0 invert opacity-90">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Matrix <span class="text-blue-500">ERP</span></h1>
            <p id="login-nome-empresa" class="text-white text-sm font-semibold mt-1 hidden"></p>
            <p id="login-slogan" class="text-gray-400 text-sm mt-1">Identifique-se para acessar o painel</p>
        </div>

        <form id="form-login" class="space-y-6 relative">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">E-mail Corporativo</label>
                <input type="email" id="email" required placeholder="seu@email.com" 
                    class="w-full p-4 input-dark rounded-xl text-sm">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Chave de Acesso</label>
                <input type="password" id="senha" required placeholder="••••••••" 
                    class="w-full p-4 input-dark rounded-xl text-sm">
            </div>

            <button type="submit" id="btn-login"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold text-sm py-4 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-blue-500/20">
                ENTRAR NO SISTEMA
            </button>

            <button type="button" id="btn-esqueci"
                class="w-full text-gray-500 hover:text-blue-400 text-xs py-2 transition-colors">
                Esqueci minha senha
            </button>
        </form>

        <div id="msg-erro" class="hidden mt-4 bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl text-xs text-center font-semibold">
        </div>
        <div id="msg-reset" class="hidden mt-4 bg-blue-500/10 border border-blue-500/30 text-blue-400 px-4 py-3 rounded-xl text-xs text-center font-semibold">
        </div>

        <div class="mt-10 text-center border-t border-white/5 pt-6">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">
                &copy; 2026 <span class="text-white">Zion Tecnologia</span> | Gestão Inteligente
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Carrega identidade da empresa do cache local (localStorage)
        // (Firestore requer autenticação — o admin salva no localStorage ao gravar)
        function aplicarIdentidade(config) {
            const elNome   = document.getElementById('login-nome-empresa');
            const elSlogan = document.getElementById('login-slogan');
            if (config.nome_empresa && elNome) {
                elNome.textContent = config.nome_empresa;
                elNome.classList.remove('hidden');
            }
            if (config.slogan && elSlogan) {
                elSlogan.textContent = config.slogan;
            }
        }

        // 1. Lê do localStorage imediatamente (sem necessidade de autenticação)
        try {
            const cached = localStorage.getItem('empresaConfig');
            if (cached) aplicarIdentidade(JSON.parse(cached));
        } catch(e) {}

        // 2. Tenta atualizar via Firestore (funciona se as regras de segurança permitirem leitura pública)
        getDoc(doc(db, 'configuracoes', 'empresa')).then(snap => {
            if (!snap.exists()) return;
            const d = snap.data();
            aplicarIdentidade(d);
            localStorage.setItem('empresaConfig', JSON.stringify(d));
        }).catch(() => {});

        const formLogin = document.getElementById('form-login');
        const btnLogin = document.getElementById('btn-login');
        const msgErro = document.getElementById('msg-erro');

        document.getElementById('btn-esqueci').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const msgReset = document.getElementById('msg-reset');
            const msgErro  = document.getElementById('msg-erro');
            msgErro.classList.add('hidden');
            msgReset.classList.add('hidden');

            if (!email) {
                msgErro.innerText = 'Preencha o e-mail acima antes de solicitar a redefinição.';
                msgErro.classList.remove('hidden');
                document.getElementById('email').focus();
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                msgReset.innerText = `✅ Link de redefinição enviado para ${email}. Verifique sua caixa de entrada.`;
                msgReset.classList.remove('hidden');
            } catch(e) {
                const erros = { 'auth/user-not-found': 'E-mail não encontrado.', 'auth/invalid-email': 'E-mail inválido.' };
                msgErro.innerText = erros[e.code] || 'Erro ao enviar e-mail. Tente novamente.';
                msgErro.classList.remove('hidden');
            }
        });

        formLogin.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            btnLogin.innerHTML = 'VALIDANDO...';
            btnLogin.classList.add('opacity-50', 'cursor-not-allowed');
            msgErro.classList.add('hidden');

            setPersistence(auth, browserLocalPersistence)
                .then(() => signInWithEmailAndPassword(auth, email, senha))
                .then((userCredential) => {
                    const tabId = Date.now().toString();
                    sessionStorage.setItem('tabId', tabId);
                    sessionStorage.setItem('userLogged', 'true');
                    sessionStorage.setItem('sessaoAtiva_' + tabId, 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    btnLogin.innerHTML = 'ENTRAR NO SISTEMA';
                    btnLogin.classList.remove('opacity-50', 'cursor-not-allowed');
                    msgErro.innerText = "Credenciais inválidas. Verifique os dados.";
                    msgErro.classList.remove('hidden');
                });
        });
    </script>
</body>
</html>
