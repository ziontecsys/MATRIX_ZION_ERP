<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix ERP - Painel de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="scripts.js"></script>
    <style>
        .overflow-y-auto::-webkit-scrollbar { width: 8px; }
        .overflow-y-auto::-webkit-scrollbar-track { background: #f1f1f1; }
        .overflow-y-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-y-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <div id="sidebar-container"></div>
    <script src="sidebar.js"></script>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">

        <div id="aba-logistica" class="space-y-6">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b pb-2">🚚 Painel de Pedidos</h2>
            <div class="bg-white p-4 md:p-6 rounded-lg shadow-sm">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b pb-4">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-700">Consulta Geral</h3>
                        <p class="text-xs text-gray-500">Busque qualquer pedido para visualizar ou imprimir.</p>
                    </div>
                    <input type="text" placeholder="🔍 Buscar por cliente..." class="p-2 border rounded border-gray-300 w-full md:w-80 text-sm outline-none focus:border-blue-500" onkeyup="window.filtrarPedidos(this.value)">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-sm border-b-2">
                                <th class="p-2 border-r">Cód. Pedido</th>
                                <th class="p-2 border-r">Data</th>
                                <th class="p-2 border-r">Cód. Cliente</th>
                                <th class="p-2 border-r">Nome</th>
                                <th class="p-2 border-r">Status</th>
                                <th class="p-2 border-r">Valor</th>
                                <th class="p-2 border-r">Condição</th>
                                <th class="p-2">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pedidos" class="text-sm">
                            <tr><td colspan="8" class="p-4 text-center text-gray-500">Carregando...</td></tr>
                        </tbody>
                    </table>
                    <div id="pag-pedidos"></div>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="firebase.js"></script>
</body>
</html>
